<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" width="560" height="160">
  <defs>

    <!-- Brand colors -->
    <!-- Accent: #2563EB, Hover: #1D4ED8 -->
    <!-- BG Deep: #0B0F1A, Slate: #161C2C -->
    <!-- Text: #F8FAFC, Secondary: #64748B -->

    <!-- Gradient for the A glyph / isotipo -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <!-- Shimmer gradient that animates -->
    <linearGradient id="shimmer" x1="-100%" y1="0%" x2="0%" y2="0%" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="55%"  stop-color="#FFFFFF"  stop-opacity="1"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-560 0; 560 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Radial glow behind isotipo -->
    <radialGradient id="glowBG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2563EB" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip for the text shimmer -->
    <clipPath id="textClip">
      <text x="178" y="115"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="78" font-weight="700" letter-spacing="-1">AJI</text>
    </clipPath>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft drop shadow for text -->
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#2563EB" flood-opacity="0.5"/>
    </filter>

    <!-- Pulse filter for the ring -->
    <filter id="pulseGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ── Background ── -->
  <rect width="560" height="160" fill="#0B0F1A"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" stroke="#2563EB" stroke-width="0.8">
    <line x1="0"   y1="40"  x2="560" y2="40"/>
    <line x1="0"   y1="80"  x2="560" y2="80"/>
    <line x1="0"   y1="120" x2="560" y2="120"/>
    <line x1="140" y1="0"   x2="140" y2="160"/>
    <line x1="280" y1="0"   x2="280" y2="160"/>
    <line x1="420" y1="0"   x2="420" y2="160"/>
  </g>

  <!-- Top accent bar (animated width) -->
  <rect x="0" y="0" width="560" height="3" fill="url(#blueGrad)" rx="1" opacity="0.7"/>

  <!-- ════════════════════════════════
       ISOTIPO — Letra "A" estilizada
       con orbit ring animado
       ════════════════════════════════ -->

  <!-- Glow orb behind symbol -->
  <ellipse cx="74" cy="80" rx="52" ry="52" fill="url(#glowBG)">
    <animate attributeName="rx" values="52;60;52" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="52;60;52" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Outer orbit ring — animated rotation -->
  <g transform="translate(74,80)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0;360" dur="8s" repeatCount="indefinite"/>
      <!-- Dashed ring -->
      <circle cx="0" cy="0" r="52"
        fill="none" stroke="#2563EB" stroke-width="1.5"
        stroke-dasharray="8 6" opacity="0.6"/>
      <!-- Traveling dot on ring -->
      <circle cx="52" cy="0" r="4" fill="#3B82F6" filter="url(#pulseGlow)" opacity="0.9"/>
      <circle cx="-52" cy="0" r="2.5" fill="#60A5FA" opacity="0.6"/>
    </g>
  </g>

  <!-- Inner ring — counter-rotation -->
  <g transform="translate(74,80)">
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="360;0" dur="12s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="38"
        fill="none" stroke="#1D4ED8" stroke-width="1"
        stroke-dasharray="4 10" opacity="0.4"/>
      <circle cx="38" cy="0" r="3" fill="#2563EB" opacity="0.7"/>
    </g>
  </g>

  <!-- Core hexagon (static, solid) -->
  <polygon points="74,38 98,52 98,78 74,92 50,78 50,52"
    fill="#161C2C" stroke="#2563EB" stroke-width="2.5" filter="url(#glow)"/>

  <!-- "A" lettermark inside hexagon -->
  <!-- Legs of the A -->
  <line x1="74" y1="46" x2="60" y2="83" stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="74" y1="46" x2="88" y2="83" stroke="url(#blueGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Crossbar of the A -->
  <line x1="63" y1="70" x2="85" y2="70" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <!-- Apex dot — pulses -->
  <circle cx="74" cy="46" r="4" fill="#60A5FA" filter="url(#pulseGlow)">
    <animate attributeName="r" values="3.5;5.5;3.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ════════════════════════════════
       TEXTO PRINCIPAL: AJI
       ════════════════════════════════ -->

  <!-- Shadow / glow layer -->
  <text x="148" y="115"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="78" font-weight="700" letter-spacing="-1"
    fill="#2563EB" opacity="0.3" filter="url(#textShadow)">AJI</text>

  <!-- Base text -->
  <text x="148" y="115"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="78" font-weight="700" letter-spacing="-1"
    fill="#F8FAFC">AJI</text>

  <!-- Shimmer sweep over text -->
  <rect x="148" y="37" width="200" height="85"
    fill="url(#shimmer)" clip-path="url(#textClip)" opacity="0.55"/>

  <!-- Accent underline — animated grow -->
  <rect x="148" y="122" width="0" height="3" fill="#2563EB" rx="1.5">
    <animate attributeName="width" values="0;200;200" dur="1.2s" fill="freeze" begin="0.5s"/>
  </rect>

  <!-- ════════════════════════════════
       TEXTO SECUNDARIO: SOLUTIONS SpA
       ════════════════════════════════ -->

  <text x="150" y="146"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="16" font-weight="400" letter-spacing="7"
    fill="#64748B">SOLUTIONS</text>

  <!-- SpA badge -->
  <rect x="364" y="128" width="44" height="22" rx="4"
    fill="none" stroke="#2563EB" stroke-width="1.2" opacity="0.6"/>
  <text x="386" y="144"
    font-family="'Courier New', monospace"
    font-size="11" font-weight="600" letter-spacing="1"
    text-anchor="middle" fill="#60A5FA" opacity="0.85">SpA</text>

  <!-- ════════════════════════════════
       CORNER BRACKETS
       ════════════════════════════════ -->
  <polyline points="8,24 8,8 24,8"   fill="none" stroke="#2563EB" stroke-width="1.8" opacity="0.5"/>
  <polyline points="536,8 552,8 552,24" fill="none" stroke="#2563EB" stroke-width="1.8" opacity="0.5"/>
  <polyline points="8,136 8,152 24,152" fill="none" stroke="#2563EB" stroke-width="1.8" opacity="0.5"/>
  <polyline points="536,152 552,152 552,136" fill="none" stroke="#2563EB" stroke-width="1.8" opacity="0.5"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="157" width="560" height="3" fill="url(#blueGrad)" rx="1" opacity="0.4"/>

</svg>
