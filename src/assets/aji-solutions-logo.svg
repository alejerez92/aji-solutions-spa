<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Main gradient for the icon -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077B6;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient for glow lines -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for icon -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip for hexagon -->
    <clipPath id="hexClip">
      <polygon points="55,10 95,10 115,44 115,96 95,130 55,130 35,96 35,44"/>
    </clipPath>
  </defs>

  <!-- Background dark -->
  <rect width="520" height="160" fill="#050D1A" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#00E5FF" stroke-width="0.5">
    <line x1="0" y1="40" x2="520" y2="40"/>
    <line x1="0" y1="80" x2="520" y2="80"/>
    <line x1="0" y1="120" x2="520" y2="120"/>
    <line x1="130" y1="0" x2="130" y2="160"/>
    <line x1="260" y1="0" x2="260" y2="160"/>
    <line x1="390" y1="0" x2="390" y2="160"/>
  </g>

  <!-- Accent horizontal line top -->
  <rect x="0" y="0" width="520" height="2" fill="url(#accentGrad)" opacity="0.6"/>
  <!-- Accent horizontal line bottom -->
  <rect x="0" y="158" width="520" height="2" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- ===== ICON: Hexagon with circuit/AJI inside ===== -->
  <!-- Outer hexagon glow -->
  <polygon points="75,8 105,8 120,34 120,96 105,122 75,122 60,96 60,34"
    fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <!-- Main hexagon -->
  <polygon points="75,14 105,14 118,38 118,92 105,116 75,116 62,92 62,38"
    fill="none" stroke="url(#mainGrad)" stroke-width="2" filter="url(#strongGlow)"/>
  <!-- Inner hexagon -->
  <polygon points="78,24 102,24 114,45 114,85 102,106 78,106 66,85 66,45"
    fill="#050D1A" stroke="#00B4D8" stroke-width="1" opacity="0.5"/>

  <!-- Circuit nodes inside hexagon -->
  <circle cx="90" cy="38" r="3" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="110" cy="65" r="2.5" fill="#00B4D8" filter="url(#glow)"/>
  <circle cx="90" cy="92" r="3" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="70" cy="65" r="2.5" fill="#00B4D8" filter="url(#glow)"/>

  <!-- Circuit lines connecting nodes -->
  <polyline points="90,38 110,65 90,92 70,65 90,38"
    fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
  <!-- Center dot -->
  <circle cx="90" cy="65" r="5" fill="url(#mainGrad)" filter="url(#strongGlow)"/>
  <!-- Center ring -->
  <circle cx="90" cy="65" r="9" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>

  <!-- Small tick marks on hexagon edges -->
  <line x1="90" y1="14" x2="90" y2="20" stroke="#00E5FF" stroke-width="1.5" opacity="0.8"/>
  <line x1="90" y1="110" x2="90" y2="116" stroke="#00E5FF" stroke-width="1.5" opacity="0.8"/>

  <!-- ===== TEXT: AJI ===== -->
  <!-- Using letter-by-letter for fine control -->
  <text x="148" y="82"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="64"
    font-weight="700"
    letter-spacing="6"
    fill="url(#mainGrad)"
    filter="url(#strongGlow)">AJI</text>

  <!-- Thin underline accent under AJI -->
  <rect x="148" y="90" width="164" height="2" fill="url(#mainGrad)" opacity="0.4" rx="1"/>

  <!-- ===== TEXT: SOLUTIONS ===== -->
  <text x="150" y="115"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="18"
    font-weight="400"
    letter-spacing="10"
    fill="#7ECFDF"
    opacity="0.9">SOLUTIONS</text>

  <!-- ===== TEXT: SPA tag ===== -->
  <rect x="352" y="54" width="46" height="20" rx="3" fill="none" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
  <text x="375" y="68"
    font-family="'Courier New', 'Lucida Console', monospace"
    font-size="11"
    font-weight="600"
    letter-spacing="3"
    text-anchor="middle"
    fill="#00E5FF"
    opacity="0.8">SpA</text>

  <!-- Decorative corner brackets -->
  <!-- Top-left -->
  <polyline points="8,20 8,8 20,8" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4"/>
  <!-- Top-right -->
  <polyline points="500,8 512,8 512,20" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4"/>
  <!-- Bottom-left -->
  <polyline points="8,140 8,152 20,152" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4"/>
  <!-- Bottom-right -->
  <polyline points="500,152 512,152 512,140" fill="none" stroke="#00E5FF" stroke-width="1.5" opacity="0.4"/>

  <!-- Subtle dot scan line effect -->
  <rect x="0" y="0" width="520" height="160" fill="url(#scanLines)" opacity="0.03"/>
</svg>
