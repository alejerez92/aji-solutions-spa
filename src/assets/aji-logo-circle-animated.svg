<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>

    <radialGradient id="glowBG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#2563EB" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="innerBG" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#161C2C"/>
      <stop offset="100%" stop-color="#0B0F1A"/>
    </radialGradient>

    <!-- Shimmer sweep for the A -->
    <linearGradient id="shimmerA" x1="0%" y1="0%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse"
      x1="20" y1="0" x2="140" y2="0">
      <stop offset="0%"   stop-color="#60A5FA" stop-opacity="0"/>
      <stop offset="45%"  stop-color="#93C5FD" stop-opacity="0.8"/>
      <stop offset="55%"  stop-color="#FFFFFF"  stop-opacity="1"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-160 0;160 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Clip paths -->
    <clipPath id="circleClip">
      <circle cx="80" cy="80" r="72"/>
    </clipPath>
    <clipPath id="letterAClip">
      <!-- The A shape for shimmer -->
      <polygon points="80,30 106,110 95,110 80,65 65,110 54,110"/>
    </clipPath>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- ── Outer circle background ── -->
  <circle cx="80" cy="80" r="78" fill="#0B0F1A"/>

  <!-- Glow pulse behind everything -->
  <circle cx="80" cy="80" r="72" fill="url(#glowBG)">
    <animate attributeName="r" values="68;76;68" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- ── Outer rotating ring (dashed) ── -->
  <g transform="translate(80,80)">
    <animateTransform attributeName="transform" type="rotate"
      from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="70"
      fill="none" stroke="#2563EB" stroke-width="1.5"
      stroke-dasharray="10 7" opacity="0.55"/>
    <!-- Traveling bright dot -->
    <circle cx="70" cy="0" r="5" fill="#60A5FA" filter="url(#strongGlow)" opacity="0.95">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Opposite dim dot -->
    <circle cx="-70" cy="0" r="3" fill="#2563EB" opacity="0.5"/>
  </g>

  <!-- ── Middle counter-rotating ring ── -->
  <g transform="translate(80,80)">
    <animateTransform attributeName="transform" type="rotate"
      from="360 0 0" to="0 0 0" dur="16s" repeatCount="indefinite"/>
    <circle cx="0" cy="0" r="56"
      fill="none" stroke="#1D4ED8" stroke-width="1"
      stroke-dasharray="5 12" opacity="0.4"/>
    <circle cx="56" cy="0" r="3.5" fill="#3B82F6" opacity="0.65" filter="url(#softGlow)"/>
    <circle cx="-56" cy="0" r="2.5" fill="#1D4ED8" opacity="0.4"/>
  </g>

  <!-- ── Inner solid circle ── -->
  <circle cx="80" cy="80" r="44" fill="url(#innerBG)" stroke="#2563EB" stroke-width="2.5" filter="url(#softGlow)"/>

  <!-- ── "A" lettermark ── -->
  <!-- Glow/shadow behind A -->
  <g filter="url(#glow)" opacity="0.4">
    <line x1="80" y1="36" x2="57" y2="105" stroke="#2563EB" stroke-width="11" stroke-linecap="round"/>
    <line x1="80" y1="36" x2="103" y2="105" stroke="#2563EB" stroke-width="11" stroke-linecap="round"/>
  </g>

  <!-- Main A strokes -->
  <line x1="80" y1="36" x2="57" y2="105" stroke="url(#blueGrad)" stroke-width="8.5" stroke-linecap="round"/>
  <line x1="80" y1="36" x2="103" y2="105" stroke="url(#blueGrad)" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Crossbar -->
  <line x1="64" y1="78" x2="96" y2="78" stroke="#93C5FD" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Shimmer over A -->
  <g clip-path="url(#letterAClip)">
    <rect x="0" y="20" width="160" height="100" fill="url(#shimmerA)" opacity="0.6"/>
  </g>

  <!-- Apex pulsing dot -->
  <circle cx="80" cy="36" r="5.5" fill="#93C5FD" filter="url(#strongGlow)">
    <animate attributeName="r"       values="4.5;7;4.5"   dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75"  dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ── 4 tick marks at cardinal points of inner circle ── -->
  <g fill="#2563EB" opacity="0.5">
    <rect x="78" y="32" width="4" height="8" rx="2"/>
    <rect x="78" y="120" width="4" height="8" rx="2"/>
    <rect x="32" y="78" width="8" height="4" rx="2"/>
    <rect x="120" y="78" width="8" height="4" rx="2"/>
  </g>

  <!-- ── Outer border ring (static, clean) ── -->
  <circle cx="80" cy="80" r="77"
    fill="none" stroke="#2563EB" stroke-width="2" opacity="0.25"/>
  <circle cx="80" cy="80" r="75"
    fill="none" stroke="#60A5FA" stroke-width="0.5" opacity="0.15"/>

  <!-- Subtle arc highlight top -->
  <path d="M 24,46 A 72,72 0 0,1 136,46"
    fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>

</svg>
